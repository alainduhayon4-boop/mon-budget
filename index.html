<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0" />
  <meta name="theme-color" content="#1C1917" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Mon Budget" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="description" content="Application de gestion de budget personnel" />

  <title>Mon Budget</title>

  <link rel="manifest" href="./manifest.json" />
  <link rel="icon" type="image/png" sizes="192x192" href="./icons/icon-192.png" />
  <link rel="icon" type="image/png" sizes="512x512" href="./icons/icon-512.png" />
  <link rel="apple-touch-icon" href="./icons/icon-192.png" />

  <!-- Preconnect pour accélérer le 1er chargement -->
  <link rel="preconnect" href="https://esm.sh" crossorigin />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

  <!-- Tailwind via CDN (build standalone non disponible offline) -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Polices web -->
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Manrope:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />

  <!-- Import maps : résolution des modules externes via CDN ESM -->
  <script type="importmap">
  {
    "imports": {
      "react": "https://esm.sh/react@18.3.1",
      "react/jsx-runtime": "https://esm.sh/react@18.3.1/jsx-runtime",
      "react-dom": "https://esm.sh/react-dom@18.3.1",
      "react-dom/client": "https://esm.sh/react-dom@18.3.1/client",
      "recharts": "https://esm.sh/recharts@2.13.3?deps=react@18.3.1,react-dom@18.3.1",
      "lucide-react": "https://esm.sh/lucide-react@0.460.0?deps=react@18.3.1"
    }
  }
  </script>

  <style>
    html, body { margin: 0; padding: 0; background: #F8F5EE; font-family: 'Manrope', system-ui, sans-serif; -webkit-font-smoothing: antialiased; -webkit-tap-highlight-color: transparent; }
    body { overscroll-behavior-y: none; }
    /* Safe area iOS */
    body { padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left); }
    #loading { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; background: #F8F5EE; }
    #loading .dot { width: 8px; height: 8px; border-radius: 50%; background: #1C1917; margin: 0 3px; display: inline-block; animation: pulse 1.4s ease-in-out infinite both; }
    #loading .dot:nth-child(2) { animation-delay: .16s; }
    #loading .dot:nth-child(3) { animation-delay: .32s; }
    @keyframes pulse { 0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; } 40% { transform: scale(1); opacity: 1; } }
  </style>
</head>
<body>
  <div id="loading">
    <div>
      <div style="text-align:center;color:#1C1917;font-family:'Fraunces',serif;font-weight:600;margin-bottom:10px;font-size:18px;">Mon Budget</div>
      <div style="text-align:center;"><span class="dot"></span><span class="dot"></span><span class="dot"></span></div>
    </div>
  </div>
  <div id="root"></div>

  <script type="module">
    // Quand l'app a monté, masquer le loader
    const observer = new MutationObserver(() => {
      const root = document.getElementById('root');
      if (root && root.children.length > 0) {
        const loading = document.getElementById('loading');
        if (loading) {
          loading.style.transition = 'opacity 200ms';
          loading.style.opacity = '0';
          setTimeout(() => loading.remove(), 220);
        }
        observer.disconnect();
      }
    });
    observer.observe(document.getElementById('root'), { childList: true });

    // Import de l'app
    import('./app.js').catch(err => {
      console.error('App failed to load:', err);
      document.getElementById('loading').innerHTML = '<div style="text-align:center;color:#B91C1C;padding:20px;">Erreur de chargement.<br><small style="color:#78716C;">Vérifie ta connexion internet pour le 1er lancement.</small></div>';
    });
  </script>
</body>
</html>
